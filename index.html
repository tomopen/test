<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TinyPenPen – Mint</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1e1b2e;
      --cream: #fdf8f2;
      --blush: #f7b8c8;
      --sky: #aadcee;
      --mint: #b6e8d4;
      --gold: #f5c842;
      --accent: #e8605a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Zen Maru Gothic', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #ccc0b0 1.2px, transparent 1.2px);
      background-size: 22px 22px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.22; pointer-events:none; z-index:0; animation:drift 14s ease-in-out infinite alternate; }
    .b1{width:500px;height:500px;background:var(--blush);top:-140px;left:-140px;animation-delay:0s;}
    .b2{width:380px;height:380px;background:var(--sky);bottom:-100px;right:-100px;animation-delay:5s;}
    .b3{width:280px;height:280px;background:var(--mint);top:45%;left:55%;animation-delay:10s;}
    @keyframes drift { from{transform:translate(0,0) scale(1);} to{transform:translate(25px,18px) scale(1.1);} }

    .page {
      position:relative; z-index:1;
      max-width:480px; margin:0 auto;
      padding:52px 20px 100px;
      display:flex; flex-direction:column; align-items:center; gap:28px;
    }
    .header { text-align:center; animation:fadeUp 0.7s ease both; }
    .pen-icon { font-size:3.5rem; display:inline-block; animation:wobble 3.5s ease-in-out infinite; filter:drop-shadow(0 6px 12px rgba(0,0,0,0.15)); }
    @keyframes wobble { 0%,100%{transform:rotate(-8deg) scale(1);} 50%{transform:rotate(8deg) scale(1.08);} }
    h1 { font-size:clamp(2.2rem,7vw,3rem); font-weight:900; letter-spacing:-0.03em; line-height:1; margin-top:8px; }
    .tagline { font-family:'Space Mono',monospace; font-size:0.82rem; color:#7a7a9a; margin-top:6px; letter-spacing:0.04em; }

    .card {
      width:100%;
      background:rgba(255,255,255,0.88);
      backdrop-filter:blur(12px);
      border-radius:32px; padding:28px;
      border:2px solid #ede4d8;
      box-shadow:0 3px 0 #ddd0c0, 0 8px 40px rgba(30,27,46,0.07);
      animation:fadeUp 0.7s 0.15s ease both;
    }
    .art {
      width:100%; aspect-ratio:1; border-radius:22px;
      background:linear-gradient(135deg,#fde8f2 0%,#e6f4fd 50%,#e8fdf4 100%);
      border:2px dashed #ddd0c8;
      display:flex; align-items:center; justify-content:center;
      font-size:7rem; position:relative; overflow:hidden; margin-bottom:22px;
    }
    .art::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 35% 30%,rgba(255,255,255,0.55) 0%,transparent 65%); }
    .art-emoji { z-index:1; animation:float 4s ease-in-out infinite; filter:drop-shadow(0 10px 20px rgba(0,0,0,0.12)); }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }

    .info { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:20px; }
    .nft-name { font-size:1.4rem; font-weight:900; line-height:1.2; }
    .nft-sub { font-family:'Space Mono',monospace; font-size:0.72rem; color:#9090b0; margin-top:4px; }
    .price-pill { background:var(--gold); color:var(--ink); font-family:'Space Mono',monospace; font-weight:700; font-size:0.82rem; padding:7px 16px; border-radius:999px; white-space:nowrap; box-shadow:0 3px 0 #c9a020; flex-shrink:0; }

    .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:22px; }
    .stat { background:var(--cream); border-radius:14px; padding:12px 8px; text-align:center; border:1.5px solid #ede4d8; }
    .stat-val { font-size:1.1rem; font-weight:900; font-family:'Space Mono',monospace; }
    .stat-label { font-size:0.68rem; color:#9090b0; margin-top:2px; }

    .btn { width:100%; padding:18px; border-radius:18px; border:none; font-family:'Zen Maru Gothic',sans-serif; font-size:1.05rem; font-weight:900; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s; letter-spacing:0.02em; }
    .btn:active { transform:translateY(2px); }
    .btn-connect { background:var(--ink); color:#fff; box-shadow:0 4px 0 #0a0820; }
    .btn-connect:hover { transform:translateY(-2px); box-shadow:0 6px 0 #0a0820; }
    .btn-mint { background:var(--accent); color:#fff; box-shadow:0 4px 0 #b03030; display:none; }
    .btn-mint:hover { transform:translateY(-2px); box-shadow:0 6px 0 #b03030; }
    .btn-mint:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    .wallet-row { display:none; align-items:center; justify-content:center; gap:8px; margin-top:12px; }
    .wallet-dot { width:8px;height:8px;background:#3aaa70;border-radius:50%;animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(1.4);} }
    .wallet-addr { font-family:'Space Mono',monospace; font-size:0.75rem; color:#7a7a9a; }

    .status { font-family:'Space Mono',monospace; font-size:0.78rem; color:#7a7a9a; text-align:center; min-height:1.2em; margin-top:12px; }
    .status.ok  { color:#3aaa70; }
    .status.err { color:var(--accent); }

    .tx-link { display:none; font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--accent); text-align:center; text-decoration:underline; margin-top:6px; }

    .footer { font-family:'Space Mono',monospace; font-size:0.68rem; color:#b0a8c0; text-align:center; animation:fadeUp 0.7s 0.4s ease both; }
    .footer a { color:inherit; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="page">
  <div class="header">
    <div class="pen-icon">🐧</div>
    <h1>TinyPenPen</h1>
    <p class="tagline">Astar Network · ERC-721 · かわいいNFT</p>
  </div>

  <div class="card">
    <div class="art"><span class="art-emoji">🐧</span></div>

    <div class="info">
      <div>
        <div class="nft-name">TinyPenPen</div>
        <div class="nft-sub">0x9336...0004 · Astar</div>
      </div>
      <div class="price-pill" id="priceLabel">読み込み中…</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-label">総発行数</div></div>
      <div class="stat"><div class="stat-val" id="statMinted">—</div><div class="stat-label">ミント済</div></div>
      <div class="stat"><div class="stat-val" id="statRemain">—</div><div class="stat-label">残り</div></div>
    </div>

    <button class="btn btn-connect" id="btnConnect" onclick="connectWallet()">🔗 ウォレットを接続する</button>
    <button class="btn btn-mint"    id="btnMint"    onclick="mintNFT()">🐧 ミントする</button>

    <div class="wallet-row" id="walletRow">
      <div class="wallet-dot"></div>
      <div class="wallet-addr" id="walletAddr"></div>
    </div>
    <div class="status" id="status">ウォレットを接続してミントしてください</div>
    <a class="tx-link" id="txLink" target="_blank">トランザクションを確認する →</a>
  </div>

  <div class="footer">
    <a href="https://opensea.io/ja/collection/tinypenpen" target="_blank">OpenSeaで見る</a>
  </div>
</div>

<script>
const CONTRACT_ADDRESS = "0x93361E9D7C22e6A76318856Bc0B65780D1780004";
const CHAIN_ID_HEX     = "0x250";
const RPC_URL          = "https://evm.astar.network";
const EXPLORER         = "https://astar.blockscout.com";

let provider, signer, contract, userAddress;

const ABI = [
  "function totalSupply() view returns (uint256)",
  "function nextTokenIdToMint() view returns (uint256)",
  "function maxTotalSupply() view returns (uint256)",
  "function activeClaimConditionId() view returns (uint256)",
  "function claimConditions(uint256) view returns (uint256,uint256,uint256,uint256,uint256,bytes32,uint256,address)",
  "function claim(address,uint256,address,uint256,(bytes32[],uint256,uint256,address),bytes) payable",
  "function mintTo(address,string) payable",
];

const s = document.createElement("script");
s.src = "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js";
s.onload = loadInfo;
document.head.appendChild(s);

async function loadInfo() {
  try {
    const rpc = new ethers.JsonRpcProvider(RPC_URL);
    const c   = new ethers.Contract(CONTRACT_ADDRESS, ABI, rpc);
    let total = 0, minted = 0;
    try { total  = Number(await c.maxTotalSupply()); } catch(e){}
    try { minted = Number(await c.nextTokenIdToMint()); } catch(e) {
      try { minted = Number(await c.totalSupply()); } catch(e2){}
    }
    document.getElementById("statTotal").textContent  = total  || "∞";
    document.getElementById("statMinted").textContent = minted || "0";
    document.getElementById("statRemain").textContent = total ? Math.max(0, total - minted) : "∞";
    try {
      const id   = await c.activeClaimConditionId();
      const cond = await c.claimConditions(id);
      const p    = parseFloat(ethers.formatEther(cond[3]));
      document.getElementById("priceLabel").textContent = p === 0 ? "FREE" : p + " ASTR";
    } catch(e) { document.getElementById("priceLabel").textContent = "—"; }
  } catch(e) { document.getElementById("priceLabel").textContent = "—"; }
}

async function connectWallet() {
  setStatus("接続中…");
  try {
    if (!window.ethereum) { setStatus("MetaMaskが必要です", "err"); return; }
    provider = new ethers.BrowserProvider(window.ethereum);
    try {
      await window.ethereum.request({ method:"wallet_switchEthereumChain", params:[{chainId:CHAIN_ID_HEX}] });
    } catch(e) {
      if (e.code === 4902) {
        await window.ethereum.request({ method:"wallet_addEthereumChain", params:[{
          chainId: CHAIN_ID_HEX, chainName: "Astar Network",
          rpcUrls: [RPC_URL],
          nativeCurrency: { name:"ASTR", symbol:"ASTR", decimals:18 },
          blockExplorerUrls: [EXPLORER],
        }]});
      }
    }
    await provider.send("eth_requestAccounts", []);
    signer      = await provider.getSigner();
    userAddress = await signer.getAddress();
    contract    = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    const short = userAddress.slice(0,6) + "…" + userAddress.slice(-4);
    document.getElementById("walletAddr").textContent = short;
    document.getElementById("walletRow").style.display = "flex";
    document.getElementById("btnConnect").style.display = "none";
    document.getElementById("btnMint").style.display = "block";
    setStatus("接続完了！ミントボタンを押してください 🐧", "ok");
  } catch(e) {
    setStatus("接続失敗: " + (e.message||"").slice(0,60), "err");
  }
}

async function mintNFT() {
  if (!signer) return;
  const btn = document.getElementById("btnMint");
  btn.disabled = true;
  document.getElementById("txLink").style.display = "none";
  setStatus("MetaMaskで承認してください…");
  try {
    let tx;
    try {
      const id   = await contract.activeClaimConditionId();
      const cond = await contract.claimConditions(id);
      const price = cond[3];
      tx = await contract.claim(
        userAddress, 1, ethers.ZeroAddress, price,
        { proofs:[], maxQuantityProof:1, quantityLimitPerWallet:0, pricePerToken:price, currency:ethers.ZeroAddress },
        "0x", { value: price }
      );
    } catch(e) {
      tx = await contract.mintTo(userAddress, "");
    }
    setStatus("送信中…");
    const receipt = await tx.wait();
    const hash = receipt.hash || tx.hash;
    setStatus("ミント成功！ありがとうございました 🎉", "ok");
    const link = document.getElementById("txLink");
    link.href = EXPLORER + "/tx/" + hash;
    link.style.display = "block";
    loadInfo();
  } catch(e) {
    setStatus("エラー: " + (e?.reason || e?.message || "不明").slice(0,80), "err");
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, type="") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + type;
}
</script>
</body>
</html>
