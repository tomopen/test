<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JapaneseTinyPenpen Mint</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #FF69B4; --bg-color: #FFF0F5; --text-color: #333; --card-bg: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kiwi Maru', serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .mint-card { background-color: var(--card-bg); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; overflow: hidden; text-align: center; border: 4px solid var(--primary-pink); }
        .image-container { width: 100%; padding: 20px; background-color: var(--card-bg); min-height: 200px; }
        .nft-image { width: 100%; height: auto; border-radius: 20px; display: block; }
        .card-content { padding: 20px 30px 30px 30px; }
        .project-name { font-size: 24px; font-weight: 700; color: var(--primary-pink); margin-bottom: 5px; }
        .chain-info { font-family: 'Space Mono', monospace; font-size: 14px; color: #888; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .eth-icon { width: 12px; height: auto; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-item { background-color: #F8F8F8; padding: 15px; border-radius: 15px; border: 1px solid #EEE; }
        .info-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 18px; font-weight: 700; color: var(--text-color); }
        .btn-connect, .btn-mint { color: white; border: none; padding: 15px 20px; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-connect { background-color: #333; }
        .btn-mint { background-color: var(--primary-pink); display: none; } /* 初期状態は非表示 */
        .btn-connect:hover, .btn-mint:hover { transform: translateY(-2px); opacity: 0.9; }
        #statusMessage { margin-top: 15px; font-size: 14px; color: #666; min-height: 1.5em; word-break: break-all; }
    </style>
</head>
<body>
    <div class="mint-card">
        <div class="image-container">
            <img src="index.jpg" id="mainImage" alt="JapaneseTinyPenpen NFT" class="nft-image" onerror="this.src='https://raw.githubusercontent.com/t-shiori/shiori-puni/main/index.jpg';">
        </div>
        <div class="card-content">
            <div class="project-name">JapaneseTinyPenpen</div>
            <div class="chain-info">
                <svg class="eth-icon" viewBox="0 0 784.37 1277.39" xmlns="http://www.w3.org/2000/svg"><g fill="#888"><path d="m392.19 0-7.22 24.61v854.72l7.22 7.21 392.18-231.81z"/><path d="m392.19 0-392.19 654.73 392.19 231.81v-356.54z"/><path d="m392.19 964.3-3.83 4.67v303.75l3.83 4.67 392.18-552.8z"/><path d="m392.19 1277.39v-313.09l-392.19-239.7z"/><path d="m392.19 886.55 392.18-231.82-392.18-179.12z"/><path d="m0 654.73 392.19 179.12v-356.54z"/></g></svg>
                Ethereum Chain
            </div>
            <div class="info-grid">
                <div class="info-item"><div class="info-label">総発行枚数</div><div class="info-value">2565 体</div></div>
                <div class="info-item"><div class="info-label">価格</div><div class="info-value">0.005 ETH</div></div>
            </div>
            <button class="btn-connect" id="connectButton" onclick="connectWallet()">🔗 ウォレットを接続する</button>
            <button class="btn-mint" id="mintButton" onclick="mintNFT()">🐧 ミントする (1体)</button>
            <div id="statusMessage">ウォレットを接続してください</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
    <script>
        const TARGET_CHAIN_ID = "0x1";
        const MINT_PRICE_ETH = "0.005"; 
        const CONTRACT_ADDRESS = "0xC04dE60292580b9b7f01d610785309f6Bd1690aF";
        const CONTRACT_ABI = ["function claim(address receiver, uint256 quantity, address currency, uint256 pricePerToken, (bytes32[] proofs, uint256 quantityLimitPerWallet, uint256 pricePerToken, address currency) allowlistProof, bytes data) payable"];
        
        let provider, signer;

        // ページ読み込み時に接続済みかチェック
        window.addEventListener('load', async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) connectWallet();
            }
        });

        async function connectWallet() {
            const status = document.getElementById('statusMessage');
            if (!window.ethereum) return alert("MetaMaskをインストールしてください");

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                
                document.getElementById('connectButton').style.display = 'none';
                document.getElementById('mintButton').style.display = 'flex';
                status.textContent = `接続完了: ${accounts[0].substring(0, 6)}...${accounts[0].substring(38)}`;
            } catch (e) { status.textContent = "接続エラー"; }
        }

        async function mintNFT() {
            const status = document.getElementById('statusMessage');
            if (!signer) return;
            try {
                const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                const price = ethers.parseEther(MINT_PRICE_ETH);
                status.textContent = "メタマスクで承認してください...";
                const tx = await contract.claim(
                    await signer.getAddress(), 1, "0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE", price,
                    { proofs: [], quantityLimitPerWallet: 0, pricePerToken: price, currency: "0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE" }, "0x",
                    { value: price }
                );
                status.textContent = "送信中...";
                await tx.wait();
                status.textContent = "ミント成功！🎉";
            } catch (e) { status.textContent = "失敗しました"; }
        }
    </script>
</body>
</html>
